<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MODS Noticias y Publicaciones</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#f5f7fb;color:#222}

/* ===== HEADER ===== */
header{
  background:#ffffff;
  padding:0 0 30px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.ribbon{position:absolute;top:0;left:0;right:0;height:12px;background:#1e63ff}
.copyright-bar{
  padding:14px 20px 4px;
  font-size:13px;
  color:#94a3b8;
  letter-spacing:1px;
  text-transform:uppercase;
  font-weight:600;
}
.copyright-bar b{color:#1e63ff}
header h1{font-size:2.2rem;margin:6px 0 4px;color:#0f172a}
header p{max-width:560px;margin:0 auto;color:#64748b;font-size:14px}

/* ===== NAV ===== */
nav{background:#1e63ff;padding:14px;text-align:center}
nav a{color:white;text-decoration:none;margin:0 12px;font-size:14px}
nav a.home-btn{background:white;color:#1e63ff;padding:8px 16px;border-radius:8px;font-weight:600;margin-left:15px}

.container{max-width:640px;margin:auto;padding:30px 16px 60px}

/* ===== COMPOSER ===== */
.composer{background:white;border-radius:14px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.06);margin-bottom:26px}
.composer h2{font-size:16px;margin:0 0 14px;color:#0f172a}
.composer-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.avatar-upload{position:relative;flex-shrink:0}
.avatar-preview{
  width:54px;height:54px;border-radius:50%;object-fit:cover;
  background:#e2e8f0;border:2px solid #1e63ff;display:block;
}
.avatar-upload input[type=file]{
  position:absolute;inset:0;opacity:0;cursor:pointer;
}
.avatar-upload .pencil{
  position:absolute;bottom:-2px;right:-2px;background:#1e63ff;color:white;
  width:18px;height:18px;border-radius:50%;font-size:10px;
  display:flex;align-items:center;justify-content:center;pointer-events:none;
}
.composer input[type=text], .composer textarea{
  width:100%;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;
  font-family:inherit;font-size:14px;resize:vertical;
}
.composer textarea{min-height:70px;margin-top:8px}
.composer-actions{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.img-btn{
  background:#eef2ff;color:#1e63ff;border:none;border-radius:8px;
  padding:8px 12px;font-size:13px;cursor:pointer;font-weight:600;
}
.img-btn input{display:none}
.publish-btn{
  background:#1e63ff;color:white;border:none;border-radius:8px;
  padding:10px 20px;font-weight:600;font-size:14px;cursor:pointer;
}
.publish-btn:disabled{opacity:.5;cursor:not-allowed}
.post-img-preview{margin-top:10px;max-height:160px;border-radius:10px;overflow:hidden}
.post-img-preview img{width:100%;display:block;object-fit:cover;max-height:160px}

/* ===== FEED ===== */
.post{background:white;border-radius:14px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.06);margin-bottom:20px}
.post-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.post-avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;background:#e2e8f0;flex-shrink:0}
.post-user{font-weight:700;font-size:14px;color:#0f172a}
.post-time{font-size:11.5px;color:#94a3b8}
.post-text{font-size:14.5px;color:#334155;line-height:1.5;margin:0 0 10px;white-space:pre-line}
.post-image{border-radius:10px;overflow:hidden;margin-bottom:10px}
.post-image img{width:100%;display:block}
.post-actions{display:flex;gap:18px;border-top:1px solid #f1f5f9;padding-top:10px}
.like-btn, .comment-toggle{
  background:none;border:none;cursor:pointer;font-size:13.5px;color:#64748b;
  display:flex;align-items:center;gap:6px;font-weight:600;padding:4px 6px;border-radius:6px;
}
.like-btn.liked{color:#1e63ff}
.like-btn .thumb{display:inline-block;transition:transform .15s}
.like-btn.liked .thumb{transform:scale(1.15)}
.like-btn:hover, .comment-toggle:hover{background:#f8fafc}

/* comments */
.comments{margin-top:12px;border-top:1px solid #f1f5f9;padding-top:12px;display:none}
.comments.open{display:block}
.comment{display:flex;gap:8px;margin-bottom:10px}
.comment-avatar{width:28px;height:28px;border-radius:50%;background:#cbd5e1;flex-shrink:0}
.comment-bubble{background:#f1f5f9;border-radius:10px;padding:7px 10px;font-size:13px;color:#334155}
.comment-bubble b{display:block;font-size:12.5px;color:#0f172a}
.comment-form{display:flex;gap:8px;margin-top:8px}
.comment-form input{
  flex:1;border:1px solid #e2e8f0;border-radius:20px;padding:8px 14px;font-size:13px;font-family:inherit;
}
.comment-form button{
  background:#1e63ff;color:white;border:none;border-radius:20px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;
}

/* ===== FOOTER ===== */
footer{background:white;color:#64748b;text-align:center;padding:26px;font-size:13px;border-top:1px solid #e2e8f0}
footer b{color:#1e63ff}
.google-login-box{margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.google-user{display:flex;align-items:center;gap:10px}
.google-user img{width:36px;height:36px;border-radius:50%;object-fit:cover}
.google-user b{font-size:14px;color:#0f172a}
.logout-link{font-size:12.5px;color:#64748b;text-decoration:underline;background:none;border:none;cursor:pointer;padding:0}
.gsi-note{font-size:11.5px;color:#94a3b8;margin-top:6px}
.google-btn{
  display:flex;align-items:center;gap:10px;background:white;color:#3c4043;
  border:1px solid #dadce0;border-radius:8px;padding:9px 16px;font-size:13.5px;
  font-weight:600;cursor:pointer;font-family:inherit;
}
.google-btn:hover{background:#f8fafc;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.composer-locked{
  background:#f8fafc;border:1px dashed #cbd5e1;border-radius:10px;
  padding:16px;text-align:center;color:#64748b;font-size:13.5px;
}
.composer-locked b{color:#0f172a}
.verified-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:15px;height:15px;background:#1e63ff;border-radius:50%;
  color:white;font-size:10px;margin-left:4px;vertical-align:middle;
}
</style>
</head>
<body>

<header>
  <div class="ribbon"></div>
  <div class="copyright-bar">© <b>MODS</b> · Ecosistema Ariba MODS</div>
  <h1>📰 Noticias y Publicaciones</h1>
  <p>Comparte novedades, capturas y avisos con la comunidad. Da like y comenta las publicaciones.</p>
</header>

<nav>
  <a href="index.html">Inicio</a>
  <a href="BlueGames_Completa.html">🎮 Ir a BlueGames</a>
  <a href="index.html" class="home-btn">🏠 Ariba MODS</a>
</nav>

<div class="container">

  <!-- COMPOSER -->
  <div class="composer">
    <h2>Crear publicación</h2>

    <!-- LOGIN CON GOOGLE (Firebase Auth) -->
    <div class="google-login-box" id="googleLoginBox">
      <button class="google-btn" id="googleSignInBtn" type="button">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.4 29.3 35 24 35c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.1 8 3.1l5.7-5.7C34.5 5.1 29.5 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21 21-9.4 21-21c0-1.2-.1-2.4-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.9 18.9 13 24 13c3.1 0 5.9 1.1 8 3.1l5.7-5.7C34.5 7.1 29.5 5 24 5c-7.7 0-14.4 4.4-17.7 9.7z"/><path fill="#4CAF50" d="M24 43c5.4 0 10.3-2.1 14-5.4l-6.5-5.3C29.4 33.9 26.8 35 24 35c-5.3 0-9.7-3.6-11.3-8.4l-6.6 5.1C9.5 38.5 16.2 43 24 43z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1 2.9-2.9 5.3-5.4 6.9l6.5 5.3C39.9 37.6 43 31.4 43 24c0-1.2-.1-2.4-.4-3.5z"/></svg>
        Iniciar sesión con Google
      </button>
    </div>
    <div id="googleUserBox" class="google-user" style="display:none">
      <img id="googleUserAvatar" src="" alt="">
      <b id="googleUserName"></b>
      <button class="logout-link" id="googleLogoutBtn">Cerrar sesión</button>
    </div>

    <div class="composer-row">
      <div class="avatar-upload">
        <img id="avatarPreview" class="avatar-preview" src="" alt="Tu foto">
        <input type="file" id="avatarInput" accept="image/*">
        <div class="pencil">✎</div>
      </div>
      <div style="flex:1">
        <input type="text" id="nameInput" placeholder="Tu nombre">
      </div>
    </div>

    <div id="composerFields">
      <textarea id="textInput" placeholder="¿Qué quieres compartir?"></textarea>
      <div id="postImgPreview" class="post-img-preview" style="display:none"><img id="postImgTag" src="" alt=""></div>
      <div class="composer-actions">
        <label class="img-btn">🖼️ Añadir imagen
          <input type="file" id="postImgInput" accept="image/*">
        </label>
        <button class="publish-btn" id="publishBtn">Publicar</button>
      </div>
    </div>
    <div id="composerLocked" class="composer-locked" style="display:none"></div>
  </div>

  <!-- FEED -->
  <div id="feed"></div>

</div>

<footer>
  © 2026 <b>MODS</b> — Todos los derechos reservados. Parte del ecosistema Ariba MODS.
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
  import {
    getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
  import {
    getFirestore, collection, query, orderBy, onSnapshot,
    addDoc, updateDoc, doc, arrayUnion, increment, serverTimestamp,
    getDocs, limit
  } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

  // Configuración de tu proyecto Firebase (arriba-mods)
  const firebaseConfig = {
    apiKey: "AIzaSyBd0dKSzGXyuBdS6-3NXgfXQm6R4LyF2qs",
    authDomain: "arriba-mods.firebaseapp.com",
    projectId: "arriba-mods",
    storageBucket: "arriba-mods.firebasestorage.app",
    messagingSenderId: "510266332320",
    appId: "1:510266332320:web:2e98600b92a6617feaa5c5",
    measurementId: "G-TRXSMJR7MC"
  };

  const fbApp = initializeApp(firebaseConfig);
  const auth = getAuth(fbApp);
  const googleProvider = new GoogleAuthProvider();
  const db = getFirestore(fbApp);
  const postsCol = collection(db, "posts");

(function(){
  var DEFAULT_AVATAR = "data:image/svg+xml;utf8,"+encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80"><rect width="80" height="80" fill="%231e63ff"/><text x="50%" y="55%" font-size="34" fill="white" text-anchor="middle" font-family="Arial">🙂</text></svg>'
  );

  var posts = [];
  var likedLocally = JSON.parse(localStorage.getItem("mods_liked_posts") || "[]");

  // Publicaciones de ejemplo: solo se crean una vez, la primera vez que
  // alguien abre la página y la colección de Firestore está vacía.
  function seedIfEmpty(){
    getDocs(query(postsCol, limit(1))).then(function(snap){
      if(!snap.empty) return;
      addDoc(postsCol, {
        name: "Ariba MODS",
        avatar: DEFAULT_AVATAR,
        text: "¡Bienvenidos al muro de Noticias y Publicaciones! Aquí compartiremos actualizaciones de BlueGames y del resto del ecosistema.",
        image: "",
        likes: 12,
        verified: true,
        comments: [{ name: "Jugador01", text: "¡Genial, esperaba esto!" }],
        createdAt: serverTimestamp()
      });
      addDoc(postsCol, {
        name: "Frojo Apps",
        avatar: DEFAULT_AVATAR,
        text: "Nueva actualización disponible en BlueGames. ¡Revisa la sección de juegos!",
        image: "",
        likes: 4,
        verified: false,
        comments: [],
        createdAt: serverTimestamp()
      });
    }).catch(function(err){ console.error("Error creando publicaciones de ejemplo:", err); });
  }

  function formatTime(ts){
    if(!ts || !ts.toDate) return "Justo ahora";
    return ts.toDate().toLocaleString("es-ES", { day:"2-digit", month:"short", hour:"2-digit", minute:"2-digit" });
  }

  function listenToPosts(){
    var q = query(postsCol, orderBy("createdAt", "desc"));
    onSnapshot(q, function(snapshot){
      posts = snapshot.docs.map(function(d){
        var data = d.data();
        return {
          id: d.id,
          name: data.name,
          avatar: data.avatar || DEFAULT_AVATAR,
          text: data.text,
          image: data.image || "",
          time: formatTime(data.createdAt),
          likes: data.likes || 0,
          liked: likedLocally.indexOf(d.id) !== -1,
          verified: !!data.verified,
          comments: data.comments || []
        };
      });
      renderFeed();
    }, function(err){
      console.error("Error escuchando publicaciones:", err);
    });
  }

  var avatarData = "";
  var postImgData = "";

  // Correos de Gmail con permiso para publicar (aparecen con insignia verificada)
  var ADMIN_EMAILS = ["raulersito7@gmail.com", "smapistarwd@gmail.com"];
  var currentUserEmail = null;

  function isAdmin(email){
    return !!email && ADMIN_EMAILS.indexOf(email.toLowerCase()) !== -1;
  }

  var feedEl, avatarPreview, avatarInput, nameInput, textInput,
      postImgInput, postImgPreview, postImgTag, publishBtn,
      googleLoginBox, googleUserBox, googleUserAvatar, googleUserName,
      googleLogoutBtn, googleSignInBtn, composerFields, composerLocked;

  function updateComposerAccess(){
    if(!composerFields || !composerLocked) return;
    if(isAdmin(currentUserEmail)){
      composerFields.style.display = "block";
      composerLocked.style.display = "none";
    } else {
      composerFields.style.display = "none";
      composerLocked.style.display = "block";
      composerLocked.innerHTML = currentUserEmail
        ? "🔒 Tu cuenta no tiene permisos de administrador para publicar."
        : "🔒 Solo los <b>administradores</b> pueden publicar. Inicia sesión con Google para verificar tu cuenta.";
    }
  }

  function applyGoogleUser(user){
    avatarData = user.photoURL || "";
    nameInput.value = user.displayName || user.email || "";
    avatarPreview.src = avatarData || DEFAULT_AVATAR;

    googleUserAvatar.src = avatarData || DEFAULT_AVATAR;
    googleUserName.textContent = user.displayName || user.email || "Usuario de Google";

    googleLoginBox.style.display = "none";
    googleUserBox.style.display = "flex";
    nameInput.setAttribute("readonly", "readonly");

    currentUserEmail = user.email || null;
    updateComposerAccess();
  }

  function clearGoogleUser(){
    avatarData = "";
    nameInput.value = "";
    nameInput.removeAttribute("readonly");
    avatarPreview.src = DEFAULT_AVATAR;
    googleUserBox.style.display = "none";
    googleLoginBox.style.display = "flex";

    currentUserEmail = null;
    updateComposerAccess();
  }

  function timeAgoLabel(){ return "Justo ahora"; }

  function renderFeed(){
    feedEl.innerHTML = "";
    posts.forEach(function(post){
      var el = document.createElement("div");
      el.className = "post";

      var commentsHtml = post.comments.map(function(c){
        return '<div class="comment"><div class="comment-avatar"></div>' +
          '<div class="comment-bubble"><b>' + escapeHtml(c.name) + '</b>' + escapeHtml(c.text) + '</div></div>';
      }).join("");

      el.innerHTML =
        '<div class="post-head">' +
          '<img class="post-avatar" src="' + post.avatar + '" alt="">' +
          '<div><div class="post-user">' + escapeHtml(post.name) +
            (post.verified ? ' <span class="verified-badge">✓</span>' : '') + '</div>' +
          '<div class="post-time">' + escapeHtml(post.time) + '</div></div>' +
        '</div>' +
        '<p class="post-text">' + escapeHtml(post.text) + '</p>' +
        (post.image ? '<div class="post-image"><img src="' + post.image + '" alt=""></div>' : '') +
        '<div class="post-actions">' +
          '<button class="like-btn' + (post.liked ? ' liked' : '') + '" data-id="' + post.id + '" data-action="like">' +
            '<span class="thumb">👍</span> <span>' + post.likes + '</span></button>' +
          '<button class="comment-toggle" data-id="' + post.id + '" data-action="toggle-comments">💬 <span>' + post.comments.length + ' comentarios</span></button>' +
        '</div>' +
        '<div class="comments" id="comments-' + post.id + '">' +
          commentsHtml +
          '<div class="comment-form">' +
            '<input type="text" placeholder="Escribe un comentario..." id="comment-input-' + post.id + '">' +
            '<button data-id="' + post.id + '" data-action="add-comment">Enviar</button>' +
          '</div>' +
        '</div>';

      feedEl.appendChild(el);
    });
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, function(m){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];
    });
  }

  function findPost(id){
    return posts.filter(function(p){ return p.id === id; })[0];
  }

  document.addEventListener("DOMContentLoaded", function(){
    feedEl = document.getElementById("feed");
    avatarPreview = document.getElementById("avatarPreview");
    avatarInput = document.getElementById("avatarInput");
    nameInput = document.getElementById("nameInput");
    textInput = document.getElementById("textInput");
    postImgInput = document.getElementById("postImgInput");
    postImgPreview = document.getElementById("postImgPreview");
    postImgTag = document.getElementById("postImgTag");
    publishBtn = document.getElementById("publishBtn");
    googleLoginBox = document.getElementById("googleLoginBox");
    googleUserBox = document.getElementById("googleUserBox");
    googleUserAvatar = document.getElementById("googleUserAvatar");
    googleUserName = document.getElementById("googleUserName");
    googleLogoutBtn = document.getElementById("googleLogoutBtn");
    googleSignInBtn = document.getElementById("googleSignInBtn");
    composerFields = document.getElementById("composerFields");
    composerLocked = document.getElementById("composerLocked");

    avatarPreview.src = DEFAULT_AVATAR;
    updateComposerAccess();

    googleSignInBtn.addEventListener("click", function(){
      googleSignInBtn.disabled = true;
      signInWithPopup(auth, googleProvider)
        .catch(function(err){
          console.error("Error de inicio de sesión con Google:", err);
          alert("No se pudo iniciar sesión con Google: " + err.message);
        })
        .finally(function(){ googleSignInBtn.disabled = false; });
    });

    googleLogoutBtn.addEventListener("click", function(){
      signOut(auth).catch(function(err){ console.error(err); });
    });

    onAuthStateChanged(auth, function(user){
      if(user){ applyGoogleUser(user); }
      else{ clearGoogleUser(); }
    });

    avatarInput.addEventListener("change", function(e){
      var file = e.target.files[0];
      if(!file) return;
      var reader = new FileReader();
      reader.onload = function(ev){
        avatarData = ev.target.result;
        avatarPreview.src = avatarData;
      };
      reader.readAsDataURL(file);
    });

    postImgInput.addEventListener("change", function(e){
      var file = e.target.files[0];
      if(!file) return;
      var reader = new FileReader();
      reader.onload = function(ev){
        postImgData = ev.target.result;
        postImgTag.src = postImgData;
        postImgPreview.style.display = "block";
      };
      reader.readAsDataURL(file);
    });

    publishBtn.addEventListener("click", function(){
      if(!isAdmin(currentUserEmail)){
        alert("Solo los administradores verificados pueden publicar.");
        return;
      }
      var name = nameInput.value.trim() || "Invitado";
      var text = textInput.value.trim();
      if(!text){ textInput.focus(); return; }

      publishBtn.disabled = true;
      addDoc(postsCol, {
        name: name,
        avatar: avatarData || DEFAULT_AVATAR,
        text: text,
        image: postImgData || "",
        likes: 0,
        verified: true,
        comments: [],
        createdAt: serverTimestamp()
      }).catch(function(err){
        console.error("Error publicando:", err);
        alert("No se pudo publicar: " + err.message);
      }).finally(function(){
        publishBtn.disabled = false;
      });

      textInput.value = "";
      postImgData = "";
      postImgPreview.style.display = "none";
      postImgInput.value = "";
    });

    feedEl.addEventListener("click", function(e){
      var btn = e.target.closest("button");
      if(!btn) return;
      var action = btn.getAttribute("data-action");
      var id = btn.getAttribute("data-id");
      var post = findPost(id);
      if(!post) return;

      if(action === "like"){
        var willLike = !post.liked;
        var idx = likedLocally.indexOf(id);
        if(willLike && idx === -1) likedLocally.push(id);
        if(!willLike && idx !== -1) likedLocally.splice(idx, 1);
        localStorage.setItem("mods_liked_posts", JSON.stringify(likedLocally));

        updateDoc(doc(db, "posts", id), {
          likes: increment(willLike ? 1 : -1)
        }).catch(function(err){ console.error("Error al dar like:", err); });

      } else if(action === "toggle-comments"){
        var box = document.getElementById("comments-" + id);
        box.classList.toggle("open");
      } else if(action === "add-comment"){
        var input = document.getElementById("comment-input-" + id);
        var val = input.value.trim();
        if(!val) return;
        input.value = "";
        updateDoc(doc(db, "posts", id), {
          comments: arrayUnion({ name: nameInput.value.trim() || "Invitado", text: val })
        }).catch(function(err){ console.error("Error al comentar:", err); });
      }
    });

    seedIfEmpty();
    listenToPosts();
  });
})();
</script>

</body>
</html>
